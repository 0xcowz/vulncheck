<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Security Vulnerability Report</title>

<style>
:root {
  --bg: #140717;
  --panel: #1c0a22;
  --border: #2b1033;
  --text: #e5dbe8;
  --muted: #b79dbf;
  --accent: #e6007e;
  --accent-soft: #ff4fa3;
  --accent-dark: #5a1a5e;
}

* {
  box-sizing: border-box;
  font-family: Inter, Segoe UI, system-ui, sans-serif;
}

body {
  margin: 0;
  padding: 40px;
  background:
    radial-gradient(circle at top, rgba(230,0,126,0.18), transparent 40%),
    radial-gradient(circle at bottom right, rgba(255,79,163,0.15), transparent 45%),
    linear-gradient(145deg, #120615, #1a0820);
  color: var(--text);
  min-height: 100vh;
}

#loading {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at center, rgba(255,79,163,.25), transparent 45%),
    linear-gradient(160deg, #120615, #1a0820);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 9999;
  opacity: 0;
  pointer-events: none;
  transition: opacity .35s ease;
}

#loading.visible {
  opacity: 1;
  pointer-events: all;
}

.progress {
  width: 360px;
  height: 10px;
  background: #0a020c;
  border-radius: 999px;
  overflow: hidden;
  box-shadow: inset 0 0 12px rgba(0,0,0,.8);
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--accent-dark), var(--accent), var(--accent-soft));
  box-shadow: 0 0 30px rgba(255,79,163,.8);
  transition: width .2s ease;
}

header {
  margin-bottom: 30px;
}

h1 {
  font-size: 28px;
  letter-spacing: 0.4px;
}

h3 {
  margin: 10px 0 20px;
  font-size: 18px;
  color: var(--accent-soft);
}

.card {
  background: linear-gradient(180deg, rgba(28,10,34,.95), rgba(28,10,34,.75));
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 28px;
  box-shadow: 0 0 40px rgba(0,0,0,.6), inset 0 0 0 1px rgba(255,255,255,.02);
}

.stat {
  text-align: center;
}

.stat h2 {
  font-size: 36px;
  margin: 0;
  color: var(--accent-soft);
  text-shadow: 0 0 25px rgba(255,79,163,.6);
}

.stat span {
  font-size: 13px;
  color: var(--muted);
}

input, button {
  width: 100%;
  padding: 12px 16px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: rgba(10,2,12,.6);
  color: var(--text);
  font-size: 14px;
}

input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent), 0 0 30px rgba(230,0,126,.5);
}

button {
  cursor: pointer;
  margin-top: 12px;
  border: none;
  background: linear-gradient(145deg, var(--accent), var(--accent-dark));
  box-shadow: 0 0 30px rgba(230,0,126,.6);
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 14px;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}

th {
  color: var(--muted);
  font-weight: 600;
}

tr:hover {
  background: rgba(255,79,163,.08);
}

.tag {
  padding: 5px 12px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  color: var(--accent-soft);
  background: rgba(230,0,126,.15);
  box-shadow: 0 0 20px rgba(255,79,163,.6);
}

a {
  color: var(--accent-soft);
  text-decoration: none;
}

footer {
  margin-top: 40px;
  text-align: center;
  font-size: 12px;
  color: var(--muted);
}
</style>
</head>

<body>

<div id="loading">
  <h2>Analyse en cours..</h2>
  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>
</div>

<header>
  <h1>VulnCheck - Lucas</h1>
</header>

<div class="card stat">
  <h2 id="count">0</h2>
  <span>vulnérabilités détectés sur cet appareil.</span>
</div>

<div class="card">
  <input id="searchInput" placeholder="Rechercher..">
  <button id="loadCsvBtn">Importer le .csv</button>
</div>

<div class="card">
  <h3>Prioritaires</h3>
  <table>
    <thead>
      <tr>
        <th>Logiciel</th>
        <th>Version</th>
        <th>CVE</th>
        <th>Editeur</th>
        <th>Action</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="tbodyMain"></tbody>
  </table>
</div>

<div class="card">
  <h3>Secondaires</h3>
  <table>
    <thead>
      <tr>
        <th>Logiciel</th>
        <th>Version</th>
        <th>CVE</th>
        <th>Editeur</th>
        <th>Action</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="tbodyMitigation"></tbody>
  </table>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const loadBtn = document.getElementById("loadCsvBtn")
  const searchInput = document.getElementById("searchInput")
  const loading = document.getElementById("loading")
  const progress = document.getElementById("progressBar")
  const tbodyMain = document.getElementById("tbodyMain")
  const tbodyMitigation = document.getElementById("tbodyMitigation")
  const countEl = document.getElementById("count")

  let rowsCache = []
  let searchTimer

  const fileInput = document.createElement("input")
  fileInput.type = "file"
  fileInput.accept = ".csv"
  fileInput.style.display = "none"
  document.body.appendChild(fileInput)

  loadBtn.onclick = () => fileInput.click()

  fileInput.onchange = () => {
    loading.classList.add("visible")
    progress.style.width = "5%"
    const reader = new FileReader()
    reader.onload = () => parseCSV(String(reader.result || ""))
    reader.readAsText(fileInput.files[0], "utf-8")
  }

  function clean(v) {
    return String(v ?? "").replace(/\uFEFF/g, "").replace(/^"+|"+$/g, "").trim()
  }

  function parseCSV(text) {
    const lines = text.split("\n").filter(l => l.trim())
    const d = lines[0].includes(";") ? ";" : ","
    const h = lines[0].split(d).map(clean)

    const idx = {
      sw: h.findIndex(x => /software|logiciel/i.test(x)),
      v: h.findIndex(x => /version/i.test(x)),
      c: h.findIndex(x => /cve/i.test(x)),
      ed: h.findIndex(x => /vendor|editeur/i.test(x)),
      ac: h.findIndex(x => /action/i.test(x))
    }

    tbodyMain.innerHTML = ""
    tbodyMitigation.innerHTML = ""
    rowsCache = []

    let i = 1
    let n = 0
    const total = Math.max(1, lines.length - 1)
    const chunk = 60

    function process() {
      const end = Math.min(i + chunk, lines.length)
      for (; i < end; i++) {
        const c = lines[i].split(d).map(clean)
        const cve = c[idx.c]
        if (!cve) continue

        const action = c[idx.ac] || "Mettre a jour"
        const target = action.toLowerCase().includes("apply mitigations")
          ? tbodyMitigation
          : tbodyMain

        const row = document.createElement("tr")
        row.innerHTML = `
          <td>${c[idx.sw] || ""}</td>
          <td>${c[idx.v] || ""}</td>
          <td><a href="https://nvd.nist.gov/vuln/detail/${cve}" target="_blank" rel="noreferrer">${cve}</a></td>
          <td>${c[idx.ed] || ""}</td>
          <td>${action}</td>
          <td><span class="tag">Vulnérable</span></td>
        `
        target.appendChild(row)
        rowsCache.push({ el: row, text: row.innerText.toLowerCase() })
        n++
      }

      countEl.textContent = String(n)
      progress.style.width = Math.round((i / total) * 100) + "%"

      if (i < lines.length) {
        requestAnimationFrame(process)
      } else {
        setTimeout(() => {
          loading.classList.remove("visible")
          progress.style.width = "0%"
        }, 350)
      }
    }

    process()
  }

  searchInput.oninput = e => {
    clearTimeout(searchTimer)
    const val = String(e.target.value || "").toLowerCase()
    searchTimer = setTimeout(() => {
      rowsCache.forEach(r => {
        r.el.style.display = r.text.includes(val) ? "" : "none"
      })
    }, 150)
  }

})
</script>

</body>
</html>
